<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark garage background -->
  <rect width="1200" height="800" fill="#1a1a1a"/>
  
  <!-- Garage floor with perspective grid -->
  <path d="M0 600 L1200 600 L1200 800 L0 800 Z" fill="#333"/>
  
  <!-- Floor grid lines -->
  <g stroke="#444" stroke-width="2">
    <line x1="0" y1="650" x2="1200" y2="650"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="0" y1="750" x2="1200" y2="750"/>
    
    <line x1="100" y1="600" x2="100" y2="800"/>
    <line x1="200" y1="600" x2="200" y2="800"/>
    <line x1="300" y1="600" x2="300" y2="800"/>
    <line x1="400" y1="600" x2="400" y2="800"/>
    <line x1="500" y1="600" x2="500" y2="800"/>
    <line x1="600" y1="600" x2="600" y2="800"/>
    <line x1="700" y1="600" x2="700" y2="800"/>
    <line x1="800" y1="600" x2="800" y2="800"/>
    <line x1="900" y1="600" x2="900" y2="800"/>
    <line x1="1000" y1="600" x2="1000" y2="800"/>
    <line x1="1100" y1="600" x2="1100" y2="800"/>
  </g>
  
  <!-- Garage wall with textures -->
  <rect x="0" y="100" width="1200" height="500" fill="#222"/>
  
  <!-- Wall texture lines -->
  <g stroke="#2a2a2a" stroke-width="3">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>
  
  <!-- Tool cabinet -->
  <rect x="100" y="250" width="200" height="350" fill="#444"/>
  <rect x="110" y="260" width="180" height="340" fill="#333"/>
  
  <!-- Tool cabinet drawers -->
  <g fill="#3a3a3a">
    <rect x="120" y="280" width="160" height="40" rx="2"/>
    <rect x="120" y="330" width="160" height="40" rx="2"/>
    <rect x="120" y="380" width="160" height="40" rx="2"/>
    <rect x="120" y="430" width="160" height="40" rx="2"/>
    <rect x="120" y="480" width="160" height="40" rx="2"/>
    <rect x="120" y="530" width="160" height="40" rx="2"/>
  </g>
  
  <!-- Drawer handles -->
  <g fill="#777">
    <rect x="170" y="295" width="60" height="10" rx="5"/>
    <rect x="170" y="345" width="60" height="10" rx="5"/>
    <rect x="170" y="395" width="60" height="10" rx="5"/>
    <rect x="170" y="445" width="60" height="10" rx="5"/>
    <rect x="170" y="495" width="60" height="10" rx="5"/>
    <rect x="170" y="545" width="60" height="10" rx="5"/>
  </g>
  
  <!-- Workbench -->
  <rect x="400" y="450" width="400" height="150" fill="#654321"/>
  <rect x="410" y="460" width="380" height="140" fill="#765432"/>
  
  <!-- Tools on the wall -->
  <g stroke="#888" stroke-width="3" fill="none">
    <path d="M750 250 L780 250 L790 260 L790 300 L780 310 L750 310 L740 300 L740 260 Z"/> <!-- Wrench -->
    <path d="M820 250 L850 250 L850 310 L820 310 Z"/> <!-- Screwdriver -->
    <path d="M880 250 C880 250, 890 260, 900 250 C910 240, 910 320, 900 310 C890 300, 880 310, 880 310"/> <!-- Pliers -->
    <circle cx="940" cy="280" r="30"/> <!-- Tool -->
    <circle cx="1000" cy="280" r="25"/> <!-- Tool -->
  </g>
  
  <!-- Car lift silhouette -->
  <path d="M650 600 L800 600 L800 580 L900 580 L900 600 L1050 600 L1050 650 L900 650 L900 630 L800 630 L800 650 L650 650 Z" fill="#444"/>
  
  <!-- Light reflections -->
  <g opacity="0.7">
    <ellipse cx="300" cy="100" rx="200" ry="60" fill="url(#light1)"/>
    <ellipse cx="900" cy="100" rx="200" ry="60" fill="url(#light2)"/>
  </g>
  
  <!-- Gradients for lights -->
  <defs>
    <radialGradient id="light1" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light2" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg> 